version: '3'

tasks:
  emacs:
    desc: "Start emacs built from this flake headless"
    cmds:
      - nix run .#emacs-nox -- --debug-init --debug
  emacs-cpp:
    desc: "Emacs in a C/C++ development environment"
    cmds:
      - nix develop .#cpp --command emacs "$@"
  emacs-python:
    desc: "Emacs in a Python development environment"
    cmds:
      - nix develop .#python --command emacs "$@"
